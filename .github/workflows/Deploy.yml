name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website
        uses: actions/checkout@v4
        with:
          path: SigLab-Website

      - name: Clone sibling repos
        run: |
          git clone --depth=1 https://github.com/RailEduKit/SigLab-3Dmodels.git
          git clone --depth=1 https://github.com/RailEduKit/SigLab-handouts.git || true
          git clone --depth=1 https://github.com/RailEduKit/SigLab-Papercut.git

      - name: Fetch branding from master repo
        run: |
          git clone --depth=1 --filter=blob:none --sparse https://github.com/RailEduKit/InteractiveSignallingLaboratory.git meta
          git -C meta sparse-checkout set branding
          mv meta/branding ./branding
          rm -rf meta

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc make

      - name: Build
        working-directory: SigLab-Website
        env:
          SIBLINGS_ROOT: ..
        run: |
          make check-deps
          make all

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: SigLab-Website/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
